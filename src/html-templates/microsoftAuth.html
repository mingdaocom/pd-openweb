<!doctype html>
<html>
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0,user-scalable=no, viewport-fit=cover" />
        <meta name="renderer" content="webkit" />
        <meta name="force-rendering" content="webkit" />
        <meta http-equiv="X-UA-Compatible" content="IE=edge,chrome=1" />
        <title content="Microsoft 授权"></title>
    </head>
    <body>
        <script>
            var params = new URLSearchParams(location.search);
            var tenant = params.get('tenant') || '';
            var stateValue = params.get('state') || '';
            if (tenant && stateValue) {
                var idx = stateValue.indexOf('_');
                var state = stateValue.substring(0, idx);
                var projectId = stateValue.substring(idx + 1);
                const currentOrigin = location.href.split('/microsoftAuth')[0];
                location.replace(
                    `${currentOrigin}/admin/platformintegration/${projectId}/microsoft?tenantId=${tenant}&state=${state}`,
                );
            }
        </script>
    </body>
</html>
